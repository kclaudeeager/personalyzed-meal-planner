# =============================================================================
# Docker Compose — Infrastructure Services
# =============================================================================
# Start:    docker compose -f infra/docker/docker-compose.yml up -d
# Stop:     docker compose -f infra/docker/docker-compose.yml down
# Reset:    docker compose -f infra/docker/docker-compose.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: meal-platform-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mealplan
      POSTGRES_PASSWORD: mealplan_dev
      POSTGRES_DB: adaptive_meals
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplan -d adaptive_meals"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meal-platform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
